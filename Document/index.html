  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is AxioDB?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "AxioDB is an embedded NoSQL database for Node.js with MongoDB-style queries. It is a pure JavaScript alternative to SQLite with zero native dependencies, no node-gyp compilation, and no platform-specific binaries. Install with 'npm install axiodb' and you have a database — no mongod process, no server setup. Perfect for Electron apps, CLI tools, and local-first applications."
          }
        },
        {
          "@type": "Question",
          "name": "Is AxioDB a replacement for MongoDB?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. AxioDB is embedded — it runs inside your app with no server. MongoDB is a client-server database for multi-user production systems. Use AxioDB for desktop apps, CLI tools, and local-first applications with 10K–500K documents. Use MongoDB when you need a shared, networked, multi-user database."
          }
        },
        {
          "@type": "Question",
          "name": "Does AxioDB work with Electron?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes — Electron is the primary use case AxioDB was built for. Zero native dependencies means no electron-rebuild, no platform-specific .node files, no node-gyp compilation. Just npm install axiodb and it works on Windows, Mac, and Linux without any rebuild step."
          }
        },
        {
          "@type": "Question",
          "name": "What is the difference between AxioDB and better-sqlite3?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "better-sqlite3 uses C native bindings and requires compilation via node-gyp. AxioDB is pure JavaScript — it installs in any Node.js environment without compilation or platform-specific builds. AxioDB also uses NoSQL/JSON document queries instead of SQL strings, includes built-in caching and Worker Threads, and works out of the box in Electron without electron-rebuild."
          }
        },
        {
          "@type": "Question",
          "name": "What is the difference between AxioDB and lowdb?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "lowdb stores everything in a single JSON file and becomes slow above 1,000–5,000 records due to full-file reads on every operation. AxioDB uses file-per-document tree storage with InMemoryCache, Worker Threads, and auto-indexing — optimized for 10,000–500,000 documents with O(1) lookups by ID and fast filtered queries."
          }
        },
        {
          "@type": "Question",
          "name": "What is the difference between AxioDB and nedb?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "NeDB is abandoned (no active maintenance since 2016) and keeps the entire database in memory. AxioDB is actively maintained, uses file-based storage, supports TypeScript, ACID transactions with savepoints and WAL, Worker Threads, AES-256 encryption, custom field indexing, and AxioDBCloud remote access."
          }
        },
        {
          "@type": "Question",
          "name": "How many documents can AxioDB handle?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "AxioDB is optimized for 10,000–500,000 documents per collection. For 1M+ documents, migrate to PostgreSQL or MongoDB. AxioDB's InMemoryCache and Worker Threads keep performance fast within this range — documentId lookups take ~1ms and indexed queries take ~2ms on 10,000 documents."
          }
        },
        {
          "@type": "Question",
          "name": "Does AxioDB support TypeScript?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Full TypeScript type definitions are included out of the box with the axiodb npm package. No @types/axiodb needed."
          }
        },
        {
          "@type": "Question",
          "name": "Does AxioDB work in the browser?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. AxioDB requires Node.js (v20+) and uses the filesystem for storage. It is a server-side and desktop embedded database. It does not run in browsers."
          }
        },
        {
          "@type": "Question",
          "name": "What is AxioDBCloud?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "AxioDBCloud is a TCP-based remote access layer for AxioDB. Deploy AxioDB in Docker or Cloud, then connect from multiple clients using the exact same API as embedded AxioDB — zero code changes. Supports 1,000+ concurrent connections, auto-reconnect with exponential backoff, and heartbeat monitoring."
          }
        }
      ]
