name: CI Checks and Auto Merge

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  detect_changes:
    name: "Detect Changes"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      run_test: ${{ steps.filter.outputs.relevant == 'true' }}
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            relevant:
              - 'source/**'
              - 'GUI/**'
              - 'Docker/**'
              - 'Test/**'
              - 'package.json'

  auth_rbac_gate:
    name: "Gate 1 — Auth (RBAC) Test Suite"
    needs: [detect_changes]
    if: needs.detect_changes.outputs.run_test == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-20.x-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-20.x-
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Run Auth (RBAC) tests
        run: npm test auth

  tcp_auth_rbac_gate:
    name: "Gate 2 — TCP Auth (AxioDBCloud RBAC) Test Suite"
    needs: [detect_changes]
    if: needs.detect_changes.outputs.run_test == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-20.x-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-20.x-
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Run TCP Auth (AxioDBCloud RBAC) tests
        run: npm test tcp-auth

  tcp_noauth_compat_gate:
    name: "Gate 3 — TCP No-Auth (Backward Compatibility) Test Suite"
    needs: [detect_changes]
    if: needs.detect_changes.outputs.run_test == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-20.x-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-20.x-
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Run TCP No-Auth (backward compatibility) tests
        run: npm test tcp-noauth

  test:
    needs: [detect_changes, auth_rbac_gate, tcp_auth_rbac_gate, tcp_noauth_compat_gate]
    if: needs.detect_changes.outputs.run_test == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 21.x, 22.x, 23.x, 24.x, 25.x, 26.x]
      fail-fast: false  # Continue testing other versions even if one fails
    name: "Gate 4 — Full Matrix Test (Node ${{ matrix.node-version }})"
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'  # Cache npm dependencies

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node-version }}-
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Run CRUD tests
        run: npm test crud

      - name: Run Transaction tests
        run: npm test transaction

      - name: Run Read Optimization tests
        run: npm test read

  auto-merge:
    name: "auto-merge"
    needs: [detect_changes, test]  # Wait for change detection and all test matrix jobs to complete
    runs-on: ubuntu-latest
    # Run if tests weren't needed for this change (irrelevant paths only), or if they ran and passed.
    # `always()` is required so this job still runs when `test` was skipped rather than succeeded.
    if: always() && (needs.detect_changes.outputs.run_test != 'true' || needs.test.result == 'success')

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-22-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-22-
            ${{ runner.os }}-node-

      # Version comparison: Ensure new version > main branch version.
      # Only relevant when the PR actually touches code/test paths - skip entirely
      # for e.g. docs-only PRs, where bumping package.json isn't expected.
      - name: Get version from current PR
        id: pr_version
        if: needs.detect_changes.outputs.run_test == 'true'
        run: echo "version_pr=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Get version from main branch
        id: main_version
        if: needs.detect_changes.outputs.run_test == 'true'
        run: |
          git fetch origin main
          echo "version_main=$(git show origin/main:package.json | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin', 'utf8')).version")" >> $GITHUB_OUTPUT

      - name: Compare Versions
        id: version_check
        if: needs.detect_changes.outputs.run_test == 'true'
        run: |
          echo "PR Version: ${{ steps.pr_version.outputs.version_pr }}"
          echo "Main Version: ${{ steps.main_version.outputs.version_main }}"
          if [ "$(printf '%s\n' "${{ steps.pr_version.outputs.version_pr }}" "${{ steps.main_version.outputs.version_main }}" | sort -V | tail -n 1)" = "${{ steps.pr_version.outputs.version_pr }}" ] && [ "${{ steps.pr_version.outputs.version_pr }}" != "${{ steps.main_version.outputs.version_main }}" ]; then
            echo "version_ok=true" >> $GITHUB_OUTPUT
          else
            echo "error: Version in PR (${{ steps.pr_version.outputs.version_pr }}) must be higher than main branch (${{ steps.main_version.outputs.version_main }})."
            exit 1
          fi

      - name: Enable Auto Merge
        if: success() && (needs.detect_changes.outputs.run_test != 'true' || steps.version_check.outputs.version_ok == 'true')
        env:
          GITHUB_TOKEN: ${{ secrets.CI_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} --auto --merge
